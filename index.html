<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арсенал Групп — Строительная компания</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        /* Общий контейнер: лого над текстом */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        /* Сама картинка */
        .logo-img {
            height: 70px;
            width: auto;
            margin-bottom: 8px; /* Отступ от картинки до текста */
        }

        /* Контейнер для текста: СЛОВА В СТРОКУ */
        .brand-text-row {
            display: flex; 
            flex-direction: row; /* В строчку */
            align-items: baseline;
            gap: 10px;
        }

        .brand-name {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: 1.6rem;
            color: #2C4A86;
            line-height: 1;
        }

        .brand-subname {
            font-size: 0.9rem;
            color: #B1B3B6;
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="brand-container">
        <!-- Исправленное имя файла (как у вас на GitHub) -->
        <img src="логотип.png" alt="Логотип" class="logo-img">
        
        <!-- Текст теперь в строчку -->
        <div class="brand-text-row">
            <span class="brand-name">АРСЕНАЛ</span>
            <span class="brand-subname">ГРУПП</span>
        </div>
    </a>

    <nav>
        <a href="#portfolio">Наши работы</a>
        <a href="#contacts">Контакты</a>
    </nav>
</header>

</body>
</html>
