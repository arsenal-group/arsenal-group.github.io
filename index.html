<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРСЕНАЛ ГРУПП — Строительная компания</title>
    <link rel="stylesheet" href="style.css">
    <style>html { scroll-behavior: smooth; }</style>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #fff;">

<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 1000;">
   <div class="brand-container">
    <img src="logo.jpg.png" alt="АРСЕНАЛ ГРУПП" style="height: 110px; width: auto; display: block;">
   </div>
    <nav style="display: flex; gap: 30px;">
        <a href="#about" style="text-decoration: none; color: #333; font-weight: bold; font-size: 18px;">О компании</a>
        <a href="#portfolio" style="text-decoration: none; color: #333; font-weight: bold; font-size: 18px;">На карте</a>
        <a href="#contacts" style="text-decoration: none; color: #333; font-weight: bold; font-size: 18px;">Контакты</a>
    </nav>
</header>

<section id="about" style="padding: 60px 10%;">
    <h1 style="color: #2C4A86; border-bottom: 2px solid #2C4A86; display: inline-block; padding-bottom: 5px; text-transform: uppercase;">О компании</h1>
    <p style="line-height: 1.8; color: #333; font-size: 18px; margin-top: 20px;">
        <strong>«Арсенал Групп»</strong> — профессиональная строительная организация, ориентированная на результат.
    </p>
</section>

<section id="portfolio" style="padding: 60px 10%; background: #f9f9f9;">
    <h2 style="color: #2C4A86; border-bottom: 2px solid #2C4A86; display: inline-block; padding-bottom: 5px; text-transform: uppercase;">Наши объекты</h2>
    <div style="margin-top: 30px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff;">
        <!-- ВСТАВЬТЕ СЮДА НОВЫЙ IFRAME ИЗ КОНСТРУКТОРА ЯНДЕКСА -->
        <iframe src="https://yandex.ru" width="100%" height="530" frameborder="0"></iframe>
    </div>

    <!-- МЕТКА ДЛЯ ПРЫЖКА ИЗ КАРТЫ -->
    <div id="details" style="margin-top: 40px; background: #fff; padding: 30px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div>
            <strong style="font-size: 22px; color: #2C4A86;">Щелковское шоссе, д. 91, к. 2</strong>
            <p style="margin: 5px 0 0 0; color: #666; font-size: 16px;">Система: Фасад</p>
        </div>
        <button onclick="openModal()" style="background: #2C4A86; color: #fff; border: none; padding: 18px 35px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase;">📷 СМОТРЕТЬ ФОТО</button>
    </div>
</section>

<div id="galleryModal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto;">
    <div style="background: #fff; margin: 2% auto; padding: 30px; width: 90%; max-width: 1100px; border-radius: 8px; position: relative;">
        <span onclick="closeModal()" style="position: absolute; right: 20px; top: 10px; color: #333; font-size: 45px; cursor: pointer; font-weight: bold;">&times;</span>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px;">
            <!-- Список из 25 фото -->
            <img src="Фасад%201.jpg" style="width: 100%; height: 220px; object-fit: cover; border-radius: 4px;">
            <img src="Фасад%202.jpg" style="width: 100%; height: 220px; object-fit: cover; border-radius: 4px;">
            <!-- ... остальные фото добавьте по аналогии ... -->
        </div>
    </div>
</div>

<script>
    function openModal() { document.getElementById("galleryModal").style.display = "block"; document.body.style.overflow = "hidden"; }
    function closeModal() { document.getElementById("galleryModal").style.display = "none"; document.body.style.overflow = "auto"; }
    window.onclick = function(event) { if (event.target == document.getElementById("galleryModal")) { closeModal(); } }
</script>
</body>
</html>
