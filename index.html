<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арсенал Групп — Строительная компания</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
        }

        /* Шапка */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Контейнер брендинга: логотип над текстом */
        .brand-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .logo-img {
            height: 50px; /* Отрегулируйте высоту под ваш логотип */
            width: auto;
            margin-bottom: 5px;
            display: block;
        }

        /* Текст в одну строку */
        .brand-text-row {
            display: flex;
            align-items: baseline;
            gap: 10px; /* Расстояние между словами */
            white-space: nowrap;
        }

        .name-main {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #2C4A86;
        }

        .name-sub {
            font-size: 1rem;
            color: #B1B3B6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Навигация */
        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #2C4A86;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Секции */
        .section {
            padding: 50px 10%;
            text-align: center;
        }

        h1 {
            color: #2C4A86;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .content-text {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<header>
    <!-- Блок логотипа -->
    <div class="brand-block">
        <!-- ВАЖНО: Проверьте название файла. Если это просто PNG, уберите .jpg -->
        <img src="логотип.jpg.png" alt="Логотип" class="logo-img">
        
        <div class="brand-text-row">
            <span class="name-main">АРСЕНАЛ</span>
            <span class="name-sub">ГРУПП</span>
        </div>
    </div>

    <nav>
        <a href="#portfolio">Наши работы</a>
        <a href="#contacts">Контакты</a>
    </nav>
</header>

<section id="about" class="section">
    <h1>О компании</h1>
    <div class="content-text">
        <p>Строительная компания <strong>«Арсенал Групп»</strong> объединяет современные инженерные решения и проверенные временем технологии.</p>
        <p>Мы специализируемся на полном цикле работ: от изысканий до сдачи готового объекта.</p>
    </div>
</section>

</body>
</html>
